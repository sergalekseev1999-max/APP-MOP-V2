    <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxW5x0iWE7Mfx11mXeY2gH_BqLC2cqv0OXEqjM5nZ0bAJ54pfutcFYe5HHkPSnLrow12Q/exec";
    
    function fetchGasAPI(action, payload) {
        return new Promise((resolve, reject) => {
            const url = new URL(GAS_API_URL);
            url.searchParams.append('action', action);
            if (payload && Object.keys(payload).length > 0) {
                url.searchParams.append('payload', JSON.stringify(payload));
            }
            fetch(url.toString(), {
                method: 'GET'
            })
            .then(res => res.json())
            .then(data => {
                resolve(data);
            })
            .catch(err => reject(err));
        });
    }

    function createGasRunner(state = {}) {
        return new Proxy(state, {
            get: function(target, prop) {
                if (prop === 'withSuccessHandler') {
                    return function(cb) { return createGasRunner({ ...target, successCb: cb }); };
                }
                if (prop === 'withFailureHandler') {
                    return function(cb) { return createGasRunner({ ...target, failCb: cb }); };
                }
                return function(...args) {
                    let payload = {};
                    if (prop === 'getInitialData') { payload = { userId: args[0] }; }
                    else if (prop === 'toggleBookingInSheet') { payload = { containerId: args[0], userName: args[1], action: args[2] }; }
                    else if (prop === 'deleteContainerInSheet') { payload = { containerId: args[0], userName: args[1] }; }
                    else if (prop === 'restoreContainerInSheet') { payload = { item: args[0], userName: args[1] }; }
                    else if (prop === 'save_dataset') { payload = args[0]; }
                    else if (prop === 'toggleGlobalBookmark') { payload = { key: args[0], ids: args[1], actionString: args[2], baseTermName: args[3] }; }
                    else if (prop === 'clearGlobalBookmarks') { payload = {}; }
                    else if (prop === 'saveUserLocalState') { payload = { userId: args[0], history: args[1], deletedItems: args[2] }; }
                    else if (prop === 'saveDeviceSession') { payload = { devId: args[0], userId: args[1], bg: args[2] }; }
                    else if (prop === 'clearDeviceSession') { payload = { devId: args[0] }; }
                    
                    fetchGasAPI(prop, payload)
                        .then(res => { if(target.successCb) target.successCb(res); })
                        .catch(err => { if(target.failCb) target.failCb(err); else console.error(err); });
                };
            }
        });
    }

            if (!val) return val;

            var resultLines = [];

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var skipLine = false;

                var processedLine = line.replace(/{([A-Z_]+)}/g, function (match, key) {
                    var val = "";
                    if (key === 'ID') val = data.id || data.Container_ID || '';
                    else if (key === 'TERM') val = data.terminal || data.term || data.name || '';
                    else if (key === 'SIZE') val = data.size || '';
                    else if (key === 'HEIGHT') val = data.height || '';
                    else if (key === 'PRICE') val = data.price || '';
                    else if (key === 'DELIVERY') val = data.delivery || '';
                    else if (key === 'ADDR') val = data.address || '';
                    else if (key === 'HOURS') val = data.hours || '';
                    else if (key === 'PROVIDER') val = data.provider || '';
                    else if (key === 'CONDITION') val = data.condition || '';
                    else if (key === 'PHONE') val = data.phone || '';
                    else if (key === 'GEO') val = data.geo || '';
                    else if (key === 'LINKS' || key === 'LINK') val = data.links || data.link || '';

                    if (!val || val.trim() === '' || val === 'Требуется расчет' || val === 'Требуется расчет в калькуляторе' || val === 'Не указано' || val === 'отсутствуют') {
                        skipLine = true;
                    }
                    return val;
                });

                if (!skipLine && processedLine.trim() !== '') {
                    resultLines.push(processedLine);
                }
            }

            var finalText = resultLines.join('\n').trim();

            if (type === 'catalog' || type === 'search') {
                if (data.provider && !finalText.includes(data.provider)) {
                    finalText = "Поставщик: " + data.provider + "\n" + finalText;
                }

        window.openFullScreenPhoto = function (indexOrSrc) {
            var viewer = document.getElementById('fs-photo-viewer');
            var imgTag = document.getElementById('fs-img-tag');

            var src;
            if (typeof indexOrSrc === 'number') {
                window.state.currentPhotoGalleryIndex = indexOrSrc;
                src = window.state.currentPhotoGallery[indexOrSrc];
            } else {
                src = indexOrSrc;
                window.state.currentPhotoGalleryIndex = 0;
                window.state.currentPhotoGallery = [src];
            }

            if (viewer && imgTag) {
                imgTag.style.opacity = '0';
                setTimeout(function () {
                    imgTag.src = src;
                    imgTag.style.opacity = '1';
                }, 150);

                var total = window.state.currentPhotoGallery.length;
                var curr = window.state.currentPhotoGalleryIndex;

                var cnt = document.getElementById('fs-counter');
                if (cnt) cnt.innerText = (curr + 1) + ' / ' + total;

                var prevBtn = document.getElementById('fs-prev-btn');
                if (prevBtn) prevBtn.style.display = (curr > 0) ? 'block' : 'none';

                var nextBtn = document.getElementById('fs-next-btn');
                if (nextBtn) nextBtn.style.display = (curr < total - 1) ? 'block' : 'none';

                if (curr < total - 1) {
                    var preload = new Image();
                    preload.src = window.state.currentPhotoGallery[curr + 1];
                }
                if (curr > 0) {
                    var preload2 = new Image();
                    preload2.src = window.state.currentPhotoGallery[curr - 1];
                }
                return;
            }

            viewer = document.createElement('div');
            viewer.id = 'fs-photo-viewer';
            viewer.className = 'fixed inset-0 bg-black/95 z-[9999999] flex items-center justify-center opacity-0 transition-opacity duration-300 touch-none';

            var navHtml = '';
            var total = window.state.currentPhotoGallery.length;
            var curr = window.state.currentPhotoGalleryIndex;

            if (total > 1) {
                navHtml += '<button id="fs-prev-btn" onclick="event.stopPropagation(); window.openFullScreenPhoto(window.state.currentPhotoGalleryIndex - 1)" class="absolute left-4 top-1/2 -translate-y-1/2 p-3 bg-white/10 rounded-full text-white hover:bg-white/20 z-50 cursor-pointer shadow-lg active:scale-95 transition-all" style="display:' + (curr > 0 ? 'block' : 'none') + '"><i data-lucide="chevron-left" class="w-8 h-8 pointer-events-none"></i></button>';
                navHtml += '<button id="fs-next-btn" onclick="event.stopPropagation(); window.openFullScreenPhoto(window.state.currentPhotoGalleryIndex + 1)" class="absolute right-4 top-1/2 -translate-y-1/2 p-3 bg-white/10 rounded-full text-white hover:bg-white/20 z-50 cursor-pointer shadow-lg active:scale-95 transition-all" style="display:' + (curr < total - 1 ? 'block' : 'none') + '"><i data-lucide="chevron-right" class="w-8 h-8 pointer-events-none"></i></button>';
                navHtml += '<div class="absolute bottom-10 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-white font-black tracking-widest text-[11px] shadow-lg"><span id="fs-counter">' + (curr + 1) + ' / ' + total + '</span></div>';
            }

            viewer.innerHTML = '<button onclick="event.stopPropagation(); window.closeFullScreenPhoto()" class="absolute top-6 right-6 p-3 bg-white/10 rounded-full text-white hover:bg-white/20 z-50 cursor-pointer shadow-lg active:scale-95 transition-all"><i data-lucide="x" class="w-6 h-6 pointer-events-none"></i></button>' +
                navHtml +
                '<div class="relative w-full h-full flex items-center justify-center" onclick="event.stopPropagation(); window.closeFullScreenPhoto()"><img id="fs-img-tag" src="' + src + '" class="max-w-full max-h-[90vh] object-contain cursor-zoom-out transition-opacity duration-150 opacity-100" /></div>';

            document.body.appendChild(viewer);
            try { if (window.lucide) lucide.createIcons(); } catch (e) { }

            var startX = 0;
            var isSwiping = false;
            viewer.addEventListener('touchstart', function (e) { startX = e.changedTouches[0].screenX; isSwiping = false; }, { passive: true });
            viewer.addEventListener('touchmove', function (e) {
                var delta = e.changedTouches[0].screenX - startX;
                if (Math.abs(delta) > 20) isSwiping = true;
            }, { passive: true });
            viewer.addEventListener('touchend', function (e) {
                if (Math.abs(e.changedTouches[0].screenX - startX) > 50 && window.state.currentPhotoGallery) {
                    var current = window.state.currentPhotoGalleryIndex;
                    var delta = e.changedTouches[0].screenX - startX;
                    if (delta > 50 && current > 0) window.openFullScreenPhoto(current - 1);
                    else if (delta < -50 && current < window.state.currentPhotoGallery.length - 1) window.openFullScreenPhoto(current + 1);
                }
            }, { passive: true });

            viewer.style.display = 'flex';
            setTimeout(function () { viewer.style.opacity = '1'; }, 10);
        };

        window.handleLogin = function () {
            var el = document.getElementById('login-input');
            var val = el ? el.value.trim() : '';
            if (!val) return;

            var btn = document.getElementById('login-btn');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>'; try { if (window.lucide) lucide.createIcons(); } catch (e) { } }

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function (res) {
                        if (res && res.success) {
                            window._saveUserId(val);
                            window.state.userId = val;

                            // Сообщаем PWA оболочке (GitHub Pages) о логине
                            try { if (window.top !== window) window.top.postMessage({type: 'AUTH_LOGIN', userId: val}, '*'); } catch(e) {}

                            window.initApp(res);
                        } else {
                            window.showToast(res ? res.error : "Ошибка входа", 'red');
                            if (btn) { btn.disabled = false; btn.innerHTML = 'Войти'; }
                        }
                    })
                    .withFailureHandler(function (err) {
                        window.showToast("Сбой сети", 'red');
                        if (btn) { btn.disabled = false; btn.innerHTML = 'Войти'; }
                    })
                    .getInitialData(val);
            } else {
                window._saveUserId(val);
                window.state.userId = val;
                window.state.screen = 'main';

                if (typeof google !== 'undefined' && google.script && google.script.url) {
                    google.script.url.getLocation(function (loc) {
                        if (loc.parameter.c) {
                            window.state.searchQuery = loc.parameter.c.replace(/[\s-]/g, '').toUpperCase();
                        }
                        window.render();
                    });
                } else {
                    window.render();
                }
            }
        };

        window.initApp = function (res) {
            if (!res || !res.success) {
                var isAuthError = res && res.error && (res.error.includes('ID не найден') || res.error.includes('заблокирован'));
                sysLog(res ? res.error : "Ответ от сервера пуст", true);
                window.showToast(res ? res.error : "Ошибка подключения", 'red');

                if (isAuthError) {
                    window._clearUserId();
                    window.state.userId = null;
                }

                window.hideLoader();
                window.state.screen = 'login';
                window.render();
                return;
            }
            sysLog("Данные получены. Рендеринг...", false);
            window.state.control = res.control || {};
            window.state.currentUser = res.control.currentUser || "";
            safeStorage.setItem('ktk_user_name', window.state.currentUser);
            window.state.control.Offer = String(res.control.Offer || "").trim();

            if (window.state.control.Main_BG_URL) {
                var bgUrl = window.state.control.Main_BG_URL.trim();
                if (bgUrl.includes('imgur.com') && !bgUrl.match(/\.(jpeg|jpg|gif|png)$/i)) {
                    bgUrl = bgUrl.replace('imgur.com', 'i.imgur.com') + '.png';
                }
                window.state.control.Main_BG_URL = bgUrl;
            }

            // НЕ перезаписываем локальную историю серверными данными.
            // На каждом устройстве своя история (localStorage).
            // Серверные данные используем только если локальных нет.
            if (window.state.history.length === 0 && res.userHistory && res.userHistory.length > 0) {
                window.state.history = res.userHistory;
            }
            if (window.state.deletedItems.length === 0 && res.userDeleted && res.userDeleted.length > 0) {
                window.state.deletedItems = res.userDeleted;
            }

            // Глобальные закладки — централизованные, общие для всех
            window.state.globalBookmarks = res.globalBookmarks || {};

            var normalizeKey = function(str) {
                var map = {'A':'А','B':'В','C':'С','E':'Е','H':'Н','K':'К','M':'М','O':'О','P':'Р','T':'Т','X':'Х','Y':'У','a':'а','c':'с','e':'е','o':'о','p':'р','x':'х','y':'у'};
                return String(str).replace(/[\u200B-\u200D\uFEFF\u00A0\t\n\r]/g, ' ').replace(/\s+/g, ' ').trim().toUpperCase().replace(/[ABCEHKMOPTXYabceopxy]/g, function(m) { return map[m] || m; });
            };

            window.state.suppliers = res.suppliers || [];
            if (res.terminals) {
                window.state.terminals = [];
                window.terminalInfo = { 'Юг': [], 'Север': [], 'Восток': [], 'Запад': [] };
                res.terminals.forEach(function (t) {
                    var name = String(t.Terminal_Name || t.Terminal || t['Терминал'] || t['Название'] || "").trim();

                    if (!name) return; // Без имени — пропускаем, но координаты НЕ обязательны

                    // Парсим координаты (могут быть с запятой, пробелами, или пустые)
                    var rawLat = String(t.Latitude || t.Lat || t['Широта'] || '').replace(',', '.').replace(/\s/g, '');
                    var rawLon = String(t.Longitude || t.Lon || t['Долгота'] || '').replace(',', '.').replace(/\s/g, '');
                    var lat = parseFloat(rawLat) || 0;
                    var lon = parseFloat(rawLon) || 0;

                    var rawDir = String(t.Region || t.Direction || t['Направление'] || '').toLowerCase();
                    var dir = 'Юг';
                    if (rawDir.includes('север')) dir = 'Север';
                    else if (rawDir.includes('восток')) dir = 'Восток';
                    else if (rawDir.includes('запад')) dir = 'Запад';

                    var term = {
                        name: name,
                        normKey: normalizeKey(name),
                        dir: dir,
                        address: t.Full_Address || t.Address || t['Адрес'] || "Адрес не указан",
                        phone: t.Phone || t['Телефон'] || "",
                        geo: t.Geo_Link || t['Гео'] || "https://yandex.ru/maps",
                        hours: t.Work_Hours || t['Режим работы'] || "Не указано",
                        info: String(t.Extra_Info || t.Примечание || t['Примечание'] || t['Инфо'] || "").trim(),
                        lat: lat,
                        lon: lon
                    };

                    window.state.terminals.push(term);
                    if (!window.terminalInfo[dir]) { window.terminalInfo[dir] = []; }
                    window.terminalInfo[dir].push(term);
                });
            }

            var fTerms = new Set();
            var fProvs = new Set();
            var fColors = new Set();
            var fPay = new Set();
            var fSizes = new Set();
            var fCond = new Set();
            var fPrice = new Set();

            if (window.state.suppliers) {
                window.state.suppliers.forEach(function (s) {
                    var pRaw = String(s.Payment_Type || s['Форма оплаты'] || "").trim();
                    if (pRaw) {
                        pRaw.split('/').forEach(function (f) {
                            if (f.trim()) fPay.add(f.trim());
                        });
                    }
                });
            }

            if (res.inventory) {
                window.state.inventory = [];
                res.inventory.forEach(function (i) {
                    var id = String(i.Container_ID || i.ID || i['Номер'] || "").trim();
                    var terminalName = String(i.Terminal_Name || i.Terminal || i['Терминал'] || "").trim();

                    if (!id || !terminalName) return;

                    var normTermKey = normalizeKey(terminalName);
                    for (var ti = 0; ti < window.state.terminals.length; ti++) {
                        if (window.state.terminals[ti].normKey === normTermKey) {
                            terminalName = window.state.terminals[ti].name;
                            break;
                        }
                    }

                    var priceValue = Number(String(i.Price_Sale || i.Price || i['Цена'] || "0").replace(/\s/g, '')) || 0;
                    var sStr = String(i.Type_Size || i.Size || i['Размер'] || "").replace(/[^0-9]/g, '');
                    var parsedPrice = priceValue > 0 ? priceValue.toLocaleString('ru-RU') + ' ₽' : "По запросу";

                    var rawHeight = String(i.Height || i['Высота'] || "").toLowerCase();
                    var heightParsed = "Стандарт (2.6м)";
                    if (rawHeight.includes('2.9') || rawHeight.includes('выс') || rawHeight.includes('hc') || rawHeight.includes('hq')) {
                        heightParsed = "Высокий (2.9м)";
                    }

                    var conditionRaw = String(i.Condition || i['Состояние'] || "б/у").trim();
                    var colorVal = String(i.Color || i['Цвет'] || "").trim();

                    var safeReserved = String(i.Reserved_By || i['Бронь'] || "").trim();
                    var lowerRes = safeReserved.toLowerCase();
                    if (lowerRes === 'undefined' || lowerRes === '#n/a' || lowerRes === 'null' || lowerRes === '#value!') {
                        safeReserved = '';
                    }

                    var dtRaw = String(i.Logs || i['Дата и время добавления'] || i['Дата'] || "").trim();
                    var dtParsed = 0;
                    if (dtRaw) {
                        var t = new Date(dtRaw).getTime();
                        if (!isNaN(t)) {
                            dtParsed = t;
                        } else {
                            var p = dtRaw.replace(/[^0-9]/g, ' ').split(/\s+/);
                            if (p.length >= 5) {
                                if (p[0].length === 4) { dtParsed = new Date(p[0], p[1] - 1, p[2], p[3], p[4]).getTime(); }
                                else if (p[2].length === 4) { dtParsed = new Date(p[2], p[1] - 1, p[0], p[3], p[4]).getTime(); }
                            } else if (p.length >= 3) {
                                if (p[0].length === 4) { dtParsed = new Date(p[0], p[1] - 1, p[2]).getTime(); }
                                else if (p[2].length === 4) { dtParsed = new Date(p[2], p[1] - 1, p[0]).getTime(); }
                            }
                        }
                    }

                    var nowMs = Date.now();
                    if (dtParsed > nowMs + 86400000 || dtParsed < 1577836800000) { dtParsed = 0; }

                    var rawProvider = String(i.Supplier || i['Поставщик'] || "Не указан")
                        .replace(/[\u200B-\u200D\uFEFF\u00A0\t\n\r]/g, ' ')
                        .replace(/\s+/g, ' ')
                        .trim()
                        .toUpperCase();

                    var c = {
                        dateAdded: dtParsed || 0,
                        id: id,
                        terminal: terminalName,
                        size: sStr,
                        height: heightParsed,
                        condition: conditionRaw,
                        price: parsedPrice,
                        rawPrice: priceValue,
                        provider: rawProvider,
                        color: colorVal,
                        link: i.Photo_URL || i['Фото'] || "#",
                        Top_Options: i.Top_Options || i['Топ'] || "",
                        Reserved_By: safeReserved
                    };

                    window.state.inventory.push(c);

                    if (c.terminal) fTerms.add(c.terminal);
                    if (c.provider) fProvs.add(c.provider);
                    if (colorVal && colorVal !== 'Default') fColors.add(colorVal);
                    if (c.size) fSizes.add(c.size + ' ФУТОВ ' + c.height);
                    if (c.condition) fCond.add(c.condition);

                    if (priceValue >= 30000 && priceValue <= 50000) fPrice.add('30-50 тысяч');
                    else if (priceValue > 50000 && priceValue <= 70000) fPrice.add('50-70 тысяч');
                    else if (priceValue > 70000 && priceValue <= 90000) fPrice.add('70-90 тысяч');
                    else if (priceValue > 90000) fPrice.add('+90 тысяч');
                });
            }

            window.filterDataGlobal['Терминал'] = Array.from(fTerms);
            window.filterDataGlobal['Поставщики'] = Array.from(fProvs);
            window.filterDataGlobal['Цвет'] = Array.from(fColors);
            window.filterDataGlobal['Форма оплаты'] = Array.from(fPay);
            window.filterDataGlobal['Размер'] = Array.from(fSizes);
            window.filterDataGlobal['Состояние'] = Array.from(fCond);
            window.filterDataGlobal['Топ варианты'] = ['Показать все 🔥'];
            window.filterDataGlobal['Цена'] = ['30-50 тысяч', '50-70 тысяч', '70-90 тысяч', '+90 тысяч'];

            // === АВТО-ДЕТЕКТ НОВЫХ КОНТЕЙНЕРОВ (без зависимости от onChange триггера) ===
            try {
                var knownKey = 'ktk_known_ids_' + (window.state.userId || 'guest');
                var knownRaw = safeStorage.getItem(knownKey);
                var knownIds = {};
                if (knownRaw) {
                    try { knownIds = JSON.parse(knownRaw); } catch(e) { knownIds = {}; }
                }
                var nowStamp = Date.now();
                var currentIds = {};
                var hasNew = false;
                window.state.inventory.forEach(function (c) {
                    var cid = String(c.id).trim().toUpperCase();
                    currentIds[cid] = 1;
                    if (!knownIds[cid]) {
                        // Новый контейнер — если у него нет даты, ставим текущее время
                        if (!c.dateAdded || c.dateAdded === 0) {
                            c.dateAdded = nowStamp;
                        }
                        hasNew = true;
                    }
                });
                // Сохраняем текущий набор ID (только актуальные — удалённые из базы убираются)
                safeStorage.setItem(knownKey, JSON.stringify(currentIds));
            } catch(eKnown) {}

            window.state.bookedContainers = {};


            if (window.state.control.Main_BG_URL) {
                safeStorage.setItem('ktk_main_bg', window.state.control.Main_BG_URL);
                var bgContainer = document.getElementById('main-bg');
                if (bgContainer) {
                    bgContainer.style.backgroundImage = "url('" + window.state.control.Main_BG_URL + "')";
                    bgContainer.style.mixBlendMode = 'screen';
                    bgContainer.style.opacity = '0.85';
                }
            }
            if (window.state.control.Accent_Color) {
                document.documentElement.style.setProperty('--accent-color', window.state.control.Accent_Color);
            }

            window.hideLoader();

            // ========================================
            // ЗАЩИТА ОТ СБРОСА ЭКРАНА ПРИ ФОНОВОМ ОБНОВЛЕНИИ
            // Это ГЛАВНАЯ проверка — она должна быть ПЕРЕД любым изменением screen
            // ========================================
            if (window._skipScreenReset) {
                window._skipScreenReset = false;
                // Данные обновлены тихо — вызывающий код (reloadServerData) сам восстановит состояние
                return;
            }

            // Если initApp уже выполнялся (приложение уже загружено), НЕ сбрасываем экран
            // Это защита от повторных вызовов initApp через google.script.url.getLocation
            if (window._initialLoadDone) {
                return;
            }

            // === ПЕРВАЯ ЗАГРУЗКА (не фоновое обновление) ===
            window.state.screen = 'main';
            window._initialLoadDone = true;

            if (typeof google !== 'undefined' && google.script && google.script.url) {
                google.script.url.getLocation(function (loc) {
                    if (loc.parameter.c) {
                        window.state.searchQuery = loc.parameter.c.replace(/[\s-]/g, '').toUpperCase();
                        window.state.screen = 'search';
                        window.render();
                        setTimeout(function () {
                            var inputEl = document.getElementById('search-input-field');
                            if (inputEl) inputEl.value = window.state.searchQuery;
                            window.performSearch();
                        }, 100);
                        return;
                    }
                    if (loc.parameter.action) {
                        if (loc.parameter.action === 'new') {
                            window.state.screen = 'newItems';
                        } else if (loc.parameter.action === 'terminal') {
                            window.state.screen = 'terminals';
                            if (loc.parameter.t) {
                                window.state.terminalSearchQuery = decodeURIComponent(loc.parameter.t);
                            }
                        }
                    }
                    window.render();
                });
            } else {
                window.render();
            }
        };

        window.hideLoader = function () {
            var el = document.getElementById('app-loader');
            if (el) { el.style.opacity = '0'; setTimeout(function () { el.style.display = 'none'; }, 300); }
        };

        window.showToast = function (msg, theme) {
            if (theme === true) theme = 'generic';

        window.getDistanceFromLatLonInKm = function (lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        window.calculateLogistics = async function (isFilterArg) {
            var mode = window.getGeoContextMode(isFilterArg);
            var clientLocation = mode === 'bookmarks' ? window.state.bmClientCoords : (mode === 'filters' ? window.state.filterClientCoords : window.state.clientCoords);
            if (!clientLocation || !clientLocation.lat) return;

            var setStatus = function (stat, err) {
                if (mode === 'bookmarks') { window.state.bmCalcStatus = stat; if (err) window.state.bmCalcErrorMsg = err; }
                else if (mode === 'filters') { window.state.filterCalcStatus = stat; if (err) window.state.filterCalcErrorMsg = err; }
                else { window.state.calcStatus = stat; if (err) window.state.calcErrorMsg = err; }
                window.updateGeoNextButton(mode);
            };

            var setCache = function (termName, cst, distKm) {
                if (mode === 'bookmarks') {
                    if (!window.state.bmTerminalDeliveryCache) window.state.bmTerminalDeliveryCache = {};
                    window.state.bmTerminalDeliveryCache[termName] = { cost: cst, km: distKm, error: false };
                } else if (mode === 'filters') {
                    if (!window.state.filterTerminalDeliveryCache) window.state.filterTerminalDeliveryCache = {};
                    window.state.filterTerminalDeliveryCache[termName] = { cost: cst, km: distKm, error: false };
                } else {
                    if (!window.state.terminalDeliveryCache) window.state.terminalDeliveryCache = {};
                    window.state.terminalDeliveryCache[termName] = { cost: cst, km: distKm, error: false };
                }
            };

            setStatus('loading');

            var baseFee = Number(window.state.control.Delivery_Fix);
            var perKmFee = Number(window.state.control.Delivery_KM);
            if (isNaN(baseFee) || isNaN(perKmFee)) {
                setStatus('error', 'Сбой: Пробелы в тарифах (NaN). Проверьте APP_Control.');
                return;
            }

            var terms = window.state.terminals.filter(function (t) { return t.lat && t.lon; });
            if (mode === 'bookmarks' && window.state.calcTargetTerminal) {
                var targetName = window.state.calcTargetTerminal;
                terms = terms.filter(function (t) { return t.name === targetName; });
            }

            if (terms.length === 0) {
                setStatus('error', 'Нет координат складов в базе');
                return;
            }

            try {
                let token = window.MAPBOX_TOKEN;
                let coordsArr = [parseFloat(clientLocation.lon) + ',' + parseFloat(clientLocation.lat)];
                terms.forEach(function (t) { coordsArr.push(parseFloat(t.lon) + ',' + parseFloat(t.lat)); });
                let mapboxUrl = "https://api.mapbox.com/directions-matrix/v1/mapbox/driving/" + coordsArr.join(';') + "?sources=0&annotations=distance&access_token=" + token;

                let controller = new AbortController();
                let timeoutId = setTimeout(() => controller.abort(), 6000);
                let response = await fetch(mapboxUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error("Сеть Mapbox отклонила запрос");
                let routeData = await response.json();
                if (routeData.code === 'Ok' && routeData.distances && routeData.distances[0]) {
                    let distArr = routeData.distances[0];
                    terms.forEach(function (t, idx) {
                        let distMeters = distArr[idx + 1];
                        if (distMeters !== null && distMeters !== undefined) {
                            let distanceKm = distMeters / 1000;
                            setCache(t.name, Math.ceil((baseFee + (distanceKm * perKmFee)) / 1000) * 1000, Math.round(distanceKm));
                        } else { throw new Error("Дистанция не найдена Mapbox"); }
                    });

                    setStatus('success');
                } else { throw new Error("Сбой массива Mapbox API"); }
            } catch (err) {
                try {
                    terms.forEach(function (t) {
                        let distanceKm = window.getDistanceFromLatLonInKm(parseFloat(clientLocation.lat), parseFloat(clientLocation.lon), parseFloat(t.lat), parseFloat(t.lon)) * 1.3;
                        setCache(t.name, Math.ceil((baseFee + (distanceKm * perKmFee)) / 1000) * 1000, Math.round(distanceKm));
                    });

                    setStatus('success');
                } catch (mathErr) {
                    setStatus('error', 'Критический сбой: ' + mathErr.message);
                }
            }
            if (window.state.screen === 'calculator' && window.state.calcStep === 'results') window.render();
        };

                });

            }

            var filtered = items.filter(function (i) {
                var pass = true;
                Object.keys(window.state.selectedFilters).forEach(function (k) {
                    if (k === cat || window.state.selectedFilters[k].length === 0) return;
                    var sf = window.state.selectedFilters;
                    if (k === 'Состояние' && !sf[k].some(cond => i.condition.toLowerCase() === cond.toLowerCase())) pass = false;
                    if (k === 'Размер' && !sf[k].some(sz => sz.includes(i.size) && sz.includes(i.height))) pass = false;
                    if (k === 'Цвет' && !sf[k].includes(i.color)) pass = false;
                    if (k === 'Поставщики' && !sf[k].includes(i.provider)) pass = false;
                    if (k === 'Терминал' && !sf[k].includes(i.terminal)) pass = false;

                        if (!allowedT.includes(i.terminal)) pass = false;

                    if (k === 'Цена') {
                        var p = Number(i.rawPrice) || 0;
                        var pPass = sf[k].some(range => {
                            if (range === '30-50 тысяч') return p >= 30000 && p <= 50000;
                            if (range === '50-70 тысяч') return p > 50000 && p <= 70000;
                            if (range === '70-90 тысяч') return p > 70000 && p <= 90000;
                            if (range === '+90 тысяч') return p > 90000;
                            return false;

                        var payFormRaw = sup ? (sup.Payment_Type || sup['Форма оплаты'] || "") : "";

        window.performSearch = function () {
            var inputEl = document.getElementById('search-input-field');

            var idMatch = val.match(/[A-Za-z]{2,4}\s*[-]?\s*\d{5,7}[-]?\d{0,1}/g);
            if (idMatch) {
                idMatch.forEach(function (m) {

                    if (clean.length >= 6 && !safeItems.includes(clean) && safeItems.length < 15) safeItems.push(clean);
                });
            }

            // 2) Если вставлены URL-ссылки — пробуем достать ID контейнера из каждой ссылки
            var lines = val.split(/[\n\r,;]+/);
            lines.forEach(function (line) {
                line = line.trim();
                if (!line) return;

                    if (urlIdMatch) {
                        urlIdMatch.forEach(function (m) {
                            var clean = m.replace(/[\s\-_]/g, '').toLowerCase();
                            if (clean.length >= 6 && !safeItems.includes(clean) && safeItems.length < 15) safeItems.push(clean);
                        });
                    }
                    // Также прбуем сам URL как поисковый запрос по ссылкам в базе
                    var urlClean = line.trim().toLowerCase();
                    if (urlClean.length >= 10 && !safeItems.includes(urlClean) && safeItems.length < 15) safeItems.push(urlClean);
                } else if (line.length >= 4 && !safeItems.includes(line.toLowerCase().replace(/[\s-]/g, ''))) {
                    // Не URL — пробуем как обычный текстовый запрос
                    var cleanLine = line.replace(/[\s-]/g, '').toLowerCase();
                    if (cleanLine.length >= 4 && safeItems.length < 15) safeItems.push(cleanLine);
                }
            });

                var singleWord = val.trim().toLowerCase().replace(/[\s-]/g, '');
                if (singleWord.length >= 3) {
                    safeItems.push(singleWord);
                } else {
                    window.showToast("Неверный формат ID", 'red');
                    return;
                }

            var results = [];
            var addedIds = {};
            window.state.inventory.forEach(function (i) {
                var realIdStr = String(i.Container_ID || i.id || "").toLowerCase().replace(/[\s-]/g, '');
                var linkStr = String(i.link || "").toLowerCase();
                var isMatch = safeItems.some(function (safeVal) {
                    return realIdStr.includes(safeVal) || safeVal.includes(realIdStr) || linkStr.includes(safeVal);
                });

                if (isMatch && !addedIds[realIdStr]) {
                    addedIds[realIdStr] = true;
                    results.push(i);

            });
            window.state.searchResults = results;
            if (val.trim() && results.length > 0 && !window.state.backToHistory) {

        // Обработка глубоких ссылок через postMessage от PWA оболочки (index.html на GitHub)

                var searchParams = {};
                if (params) {
                    params.replace('?', '').split('&').forEach(function (p) {

<!-- ═══ СИНХРОНИЗАЦИЯ ЗАКЛАДОК → ИИ МОП (ПРЯМОЙ СИНК С ФРОНТЕНДА) ═══ -->
<script>
(function() {
  'use strict';
  var MOP_URL = 'https://senior-mop-hub-serbrn99.amvera.io/mop/bookmarks';
  function syncBookmarksToMop() {
    try {
      var userId = window.state && window.state.currentUser ? window.state.currentUser : '';
      if (!userId) return;
      var bm = window.state.globalBookmarks || {};
      if (Object.keys(bm).length === 0) return;
      var xhr = new XMLHttpRequest();
      xhr.open('POST', MOP_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() { if (xhr.status === 200) console.log('[SYNC] Закладки → МОП ✅ (' + Object.keys(bm).length + ' групп)'); };
      xhr.onerror = function() {};
      xhr.send(JSON.stringify({ action: 'sync', userId: userId, bookmarks: bm, role: 'Админ' }));
    } catch(e) {}
  }
  var _origTgl = window.toggleBookmark;
  if (_origTgl) { window.toggleBookmark = function() { _origTgl.apply(this, arguments); setTimeout(syncBookmarksToMop, 1000); }; }
  var _origClr = window.clearBookmarksSafe;
  if (_origClr) { window.clearBookmarksSafe = function() { _origClr.apply(this, arguments); setTimeout(syncBookmarksToMop, 1000); }; }
  setTimeout(syncBookmarksToMop, 5000);
})();
</script>
